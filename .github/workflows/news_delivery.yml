name: News Delivery

on:
  # 起動は外部スケジューラ（cron-job.org）から workflow_dispatch API で行う。
  # GitHub の schedule(cron) は無料publicリポで時刻保証がなく大幅遅延・スキップ
  # するため使用しない（詳細: docs/NG-docs/NG理由.txt）。
  # 配信時刻(JST): 07:37 / 12:07 / 17:53 ← cron-job.org 側で設定する。
  workflow_dispatch: {}    # 手動実行 / 外部スケジューラからの起動

jobs:
  deliver:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run news bot
        env:
          GROQ_API_KEY:              ${{ secrets.GROQ_API_KEY }}
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
          LINE_USER_ID:              ${{ secrets.LINE_USER_ID }}
          # 以下はオプション（Secrets に登録しなければデフォルト値を使用）
          # GROQ_MODEL:    llama-3.3-70b-versatile
          # TOP_N:         5
          # HOURS_WINDOW:  7
        run: python news_bot.py
